name: Bao loi Skill
description: Skill hoat dong sai / thieu / loi dinh dang
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Cam on vi bao loi. Vui long dien cac thong tin sau.

  - type: dropdown
    id: skill
    attributes:
      label: Skill bi loi
      description: Skill nao hoat dong sai?
      options:
        - product-marketing-context
        - 00-ke-hoach-mkt
        - 01-lich-noi-dung
        - 02-brief-chien-dich
        - 03-danh-gia-hieu-suat
        - 04-script-video
        - 05-copy-quang-cao
        - 06-brief-ugc-egc
        - 07-bao-cao-marketing
        - 08-nghien-cuu-doi-thu
        - 09-insight-khach-hang
        - 10-tinh-kpi-nguoc
        - 11-thiet-lap-kenh
        - 12-brief-landing-page
        - 13-phan-tich-du-lieu
        - 14-email-marketing
        - 15-social-listening
        - 16-marketing-psychology
        - 17-pricing-strategy
        - 18-referral-program
        - 19-ab-test-setup
        - Khac (ghi ro trong mo ta)
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform dung
      options:
        - Claude Code
        - Claude Pro / Claude.ai
        - ChatGPT
        - Gemini
        - Cursor / Windsurf
        - Copilot
        - Khac
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Mo ta loi
      description: Loi xay ra khi nao, cai gi khong dung?
      placeholder: VD - Khi toi chay skill 05-copy-quang-cao, skill khong hoi cau ve doi tuong khach hang...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ket qua mong doi
      description: Ban mong doi dieu gi xay ra?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Ket qua thuc te
      description: Dieu gi thuc su xay ra? (Copy output cua AI neu co the)

  - type: textarea
    id: context
    attributes:
      label: Thong tin them
      description: Version skill, setup, bat ky dieu gi huu ich
