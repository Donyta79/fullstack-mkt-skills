name: De xuat Skill moi
description: De xuat skill marketing moi can co
title: "[Skill Request] "
labels: ["enhancement", "new-skill"]
body:
  - type: markdown
    attributes:
      value: |
        Cam on vi de xuat skill moi! Vui long dien chi tiet.

  - type: input
    id: skill-name
    attributes:
      label: Ten skill de xuat
      description: Tieng Viet + kebab-case (vi du "22-influencer-marketing")
      placeholder: 22-ten-skill
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - strategy
        - content
        - performance
        - operations
        - foundation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Van de skill nay giai quyet
      description: Tai sao can skill nay? Skill hien tai thieu gi?
    validations:
      required: true

  - type: textarea
    id: triggers
    attributes:
      label: Trigger phrases (khi nao user can skill nay)
      description: Liet ke 5-10 cau user co the noi de kich hoat skill nay
      placeholder: |
        - "Tim influencer phu hop"
        - "Tinh ngan sach KOL"
        - "Chon influencer cho chien dich"
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Output mong muon
      description: Skill nay output gi? File .md voi cau truc the nao?

  - type: textarea
    id: related
    attributes:
      label: Skill lien quan
      description: Co the goi/duoc goi boi skill nao?

  - type: checkboxes
    id: contribute
    attributes:
      label: Ban muon dong gop?
      options:
        - label: Toi muon tu viet skill nay va tao PR
        - label: Toi chi de xuat — nguoi khac viet
